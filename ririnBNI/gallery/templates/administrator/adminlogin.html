{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login Administrator - BNI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/administrator.css' %}">
</head>
<body class="login-page">

    <!-- Decorative Elements -->
    <div class="login-decoration">
        <div class="decoration-circle"></div>
        <div class="decoration-circle-2"></div>
        <div class="decoration-circle-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-landmark"></i>
                </div>
                <h1>BNI</h1>
                <p>Selamat datang kembali Admin</p>
            </div>
            
            <form class="login-form" id="loginForm" method="POST" action="/administrator/login/">
                {% csrf_token %}
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-id-card"></i></span>
                    <input type="text" name="nik" id="nik" placeholder="NIK" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#">Lupa Password?</a>
                <span class="separator">|</span>
                <a href="/nasabah/login">Login Nasabah</a>
            </div>
        </div>
    </div>

    <script>
        // Optional: Add loading effect on submit
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.querySelector('.login-btn');
        
        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                const nik = document.getElementById('nik').value;
                const password = document.getElementById('password').value;
                
                if (!nik || !password) {
                    e.preventDefault();
                    alert('Mohon isi NIK dan Password');
                    return;
                }
                
                // Optional: Show loading state
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
                loginBtn.disabled = true;
            });
        }




        

















        
    </script>
</body>
</html>
